<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            /* Используем переменные Telegram для темы */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Растягиваем на весь экран */
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 12px 24px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="status">Загрузка...</h1>
        <p>Режим: <b id="mode">Обычный</b></p>
        <button onclick="closeApp()">Закрыть приложение</button>
    </div>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;

        // 1. Сообщаем Telegram, что приложение загружено
        tg.ready();

        // 2. Расширяем на максимум (Fullscreen)
        tg.expand();

        // Проверка состояния
        document.getElementById('status').innerText = "WebApp Готов";
        
        if (tg.isExpanded) {
            document.getElementById('mode').innerText = "Развернуто (Fullscreen)";
        }

        // Установка цвета хедера (под цвет темы)
        tg.setHeaderColor('secondary_bg_color');

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
